<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>;</title>
  <meta name="description" content="semicolon" />

  <!-- Semicolon favicon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Archivo Black, sans-serif' font-style='italic' font-size='90' text-anchor='middle' fill='%23191919'%3E;%3C/text%3E%3C/svg%3E" />

  <!-- Archivo Black -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #191919;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* white → grey */
      background: radial-gradient(circle at 50% 40%, #ffffff 0%, #e6e6e6 100%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .mark {
      font-family: "Archivo Black", sans-serif;
      font-style: italic;
      font-weight: 400;
      color: var(--ink);
      font-size: clamp(8rem, 34vw, 22rem);
      line-height: 1;
      user-select: none;
    }
  </style>
</head>
<body>
  <main>
    <span class="mark">;</span>
  </main>
</body>
</html>
